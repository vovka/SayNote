name: CI

on:
  push:
    branches:
      - main
      - work
  pull_request:

jobs:
  test:
    name: Workspace tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run workspace tests
        run: npm test
