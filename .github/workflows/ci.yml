name: CI

on:
  push:
    branches:
      - main
      - work
  pull_request:

jobs:
  test:
    name: Workspace tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm run -w backend test

      - name: Run frontend tests (if configured)
        run: npm run -w frontend test --if-present

      - name: Run shared tests (if configured)
        run: |
          if [ -f shared/package.json ]; then
            npm run -w shared test --if-present
          else
            echo "Skipping shared tests: shared/package.json not found"
          fi
