services:
  saynote:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - .:/app
      - saynote_node_modules:/app/node_modules
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    env_file:
      - .env
    depends_on:
      - saynote
    working_dir: /app
    command: >
      sh -c "npx tsc -p backend/tsconfig.json && node backend/dist/backend/worker/index.js"
    environment:
      WORKER_BATCH_SIZE: ${WORKER_BATCH_SIZE:-5}
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-2000}
      WORKER_MAX_JOBS: ${WORKER_MAX_JOBS:-0}
      WORKER_CONTINUOUS: ${WORKER_CONTINUOUS:-true}
    volumes:
      - .:/app
      - saynote_node_modules:/app/node_modules

volumes:
  saynote_node_modules:
